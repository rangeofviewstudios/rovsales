<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{--bg:#F0E6E0;--surface:rgba(255,251,245,.74);--surface-2:#EADFD2;--border:rgba(22,12,40,.14);--text:#160C28;--text-muted:rgba(22,12,40,.74);--text-faint:rgba(22,12,40,.55);--primary:#A56A67;--primary-hover:#8a514e;--primary-hl:rgba(165,106,103,.16);--gold:#9a6b12;--good:#2f7d5b;--radius:.7rem;--shadow:0 1px 3px rgba(22,12,40,.06),0 6px 18px rgba(22,12,40,.07)}

html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}

button,select,input{font:inherit;color:inherit}button{cursor:pointer;background:none;border:none}a{color:inherit;text-decoration:none}
/* ── twilight backdrop ── */
.sky{position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden;background-color:#0F0820;background-image:radial-gradient(150% 40% at 50% 84%,rgba(227,194,74,.15) 0%,rgba(165,106,103,.22) 24%,rgba(78,61,115,.17) 50%,transparent 78%),radial-gradient(130% 52% at 50% -10%,rgba(36,18,58,.72) 0%,transparent 60%),linear-gradient(180deg,#0F0820 0%,#0F0820 32%,#1B0E2E 62%,#24123A 74%,#0F0820 100%);box-shadow:inset 0 0 clamp(140px,20vw,340px) rgba(7,3,16,.6)}
.sky::after{content:"";position:absolute;inset:0;background:radial-gradient(130% 34% at 50% 86%,rgba(227,194,74,.08),rgba(165,106,103,.06) 40%,transparent 72%);animation:breathe 22s ease-in-out infinite alternate}
@keyframes breathe{0%{opacity:.55;transform:translateY(0) scale(1)}100%{opacity:1;transform:translateY(-1.5%) scale(1.06)}}
[data-theme="light"] .sky{background-color:#F0E6E0;background-image:radial-gradient(45% 35% at 14% 8%,rgba(227,194,74,.20),transparent 64%),radial-gradient(48% 40% at 86% 14%,rgba(78,61,115,.13),transparent 70%),radial-gradient(50% 42% at 16% 60%,rgba(165,106,103,.13),transparent 68%),radial-gradient(46% 38% at 88% 82%,rgba(78,61,115,.10),transparent 70%)}

/* ── header ── */
header{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);padding:.75rem 1.4rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;backdrop-filter:blur(12px);background:color-mix(in oklch,var(--bg) 88%,transparent)}
.brand{display:flex;align-items:center;gap:.7rem}
.brand .mark{width:40px;height:40px;border-radius:10px;background:#1B0E2E;border:1px solid rgba(240,230,224,.12);display:flex;align-items:center;justify-content:center;padding:6px;flex-shrink:0}
.brand .mark img{width:100%;height:100%;object-fit:contain;display:block}
.brand h1{font-size:1.1rem;font-weight:700;letter-spacing:-.01em;line-height:1.1}
.brand .tag{font-size:.74rem;font-weight:500;color:var(--text-faint);letter-spacing:.005em;line-height:1.2;margin-top:.12rem}
.hdr-r{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.search{position:relative}
.search input{padding:.45rem .7rem .45rem 2rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:.82rem;outline:none;min-width:210px}
.search input:focus{border-color:var(--primary)}
.search svg{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--text-faint)}
.icbtn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);border:1px solid var(--border)}.icbtn:hover{background:var(--surface-2);color:var(--text)}
/* ── layout ── */
.wrap{max-width:1180px;margin:0 auto;padding:1.4rem;display:grid;grid-template-columns:224px 1fr;gap:1.4rem;align-items:start}
@media(max-width:820px){.wrap{grid-template-columns:1fr;gap:1rem}}
.nav{position:sticky;top:5rem;display:flex;flex-direction:column;gap:.28rem}
@media(max-width:820px){.nav{position:static;flex-direction:row;overflow-x:auto;gap:.4rem;padding-bottom:.3rem}}
.navlabel{font-family:"DM Mono",monospace;font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);padding:.4rem .8rem .15rem}

.navitem{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;border-radius:var(--radius);border:1px solid transparent;color:var(--text-muted);font-size:.9rem;font-weight:500;white-space:nowrap;transition:.15s;text-align:left;width:100%}
.navitem:hover{background:var(--surface-2)}
.navitem.on{background:var(--surface);border-color:var(--border);color:var(--text);box-shadow:var(--shadow)}
.navitem .ico{font-size:1.05rem;opacity:.9;width:1.2em;text-align:center}
.navitem .ct{margin-left:auto;font-family:"DM Mono",monospace;font-size:.68rem;color:var(--text-faint)}
.navitem.todo{opacity:.5;cursor:default}.navitem.todo:hover{background:none}
@media(max-width:820px){.navitem.todo{display:none}.navitem .ct{margin-left:.3rem}}
/* ── content ── */
main{min-width:0}
.sechead{margin-bottom:1.3rem}
.sechead h2{font-size:clamp(1.6rem,3.6vw,2.3rem);font-weight:700;letter-spacing:-.02em;line-height:1.02;display:flex;align-items:center;gap:.6rem}
.sechead h2 .em{font-size:1.6rem}
.sechead .dek{font-family:'Instrument Serif',serif;font-style:normal;font-size:1.12rem;color:var(--text-faint);margin-top:.4rem;max-width:60ch}
.block{margin:0 0 2rem}
.blocktitle{font-family:"DM Mono",monospace;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.7rem;display:flex;align-items:center;gap:.5rem}
.blocktitle::after{content:"";flex:1;height:1px;background:var(--border)}
.prose{font-family:'Inter',sans-serif;font-size:.95rem;line-height:1.62;color:var(--text);max-width:70ch}
.prose b,.prose strong{font-weight:600;color:var(--text)}
/* callouts */
.callrow{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
@media(max-width:560px){.callrow{grid-template-columns:1fr}}
.call{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:var(--radius);padding:.85rem 1rem;box-shadow:var(--shadow)}
.call.who{border-left-color:var(--good)}.call.skip{border-left-color:var(--primary)}
.call.gold{border-left-color:var(--gold)}
.call .lbl{font-family:"DM Mono",monospace;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:.3rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.call .txt{font-family:'Inter',sans-serif;font-size:.9rem;line-height:1.55;color:var(--text)}
.call.oneliner .txt{font-family:'Instrument Serif',serif;font-style:normal;font-size:1.1rem;line-height:1.4}
a.deepdive{display:flex;align-items:center;gap:1rem;text-decoration:none;transition:border-color .15s,transform .15s}
a.deepdive:hover{border-color:var(--primary);transform:translateY(-2px)}
a.deepdive .body{flex:1}
a.deepdive .go{font-family:"DM Mono",monospace;font-size:.8rem;font-weight:500;color:var(--gold);white-space:nowrap}
/* engines / channel table */
.tbl{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);font-family:'Inter',sans-serif}
.tbl th{text-align:left;font-family:"DM Mono",monospace;font-weight:500;font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);padding:.6rem .85rem;background:var(--surface-2);border-bottom:1px solid var(--border)}
.tbl td{padding:.7rem .85rem;font-size:.86rem;line-height:1.45;border-bottom:1px solid var(--border);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl td.eng{font-weight:600;font-family:"Space Grotesk",sans-serif;white-space:nowrap;color:var(--text)}
.tbl td.money{color:var(--text-muted)}
.tbl td.ch{font-weight:600;font-family:"Space Grotesk",sans-serif;color:var(--primary)}
@media(max-width:560px){.tbl,.tbl tbody,.tbl tr,.tbl td{display:block;width:100%}.tbl thead{display:none}.tbl td{border-bottom:none;padding:.25rem .85rem}.tbl tr{border-bottom:1px solid var(--border);padding:.5rem 0}.tbl td.eng{padding-top:.6rem}}
/* angle cards */
.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem}
@media(max-width:720px){.cards3{grid-template-columns:1fr}}
.anglecard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1rem;box-shadow:var(--shadow)}
.anglecard .a{font-family:"DM Mono",monospace;font-size:.7rem;letter-spacing:.06em;color:var(--gold);text-transform:uppercase;margin-bottom:.35rem}
.anglecard .n{font-weight:700;font-size:1rem;margin-bottom:.3rem}
.anglecard .d{font-family:'Inter',sans-serif;font-size:.84rem;line-height:1.5;color:var(--text-muted)}
/* offer cards (spine) */
.offergrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(240px,100%),1fr));gap:.8rem}
.offercard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.95rem 1.05rem;box-shadow:var(--shadow)}
.offercard .n{font-weight:700;font-size:1rem;margin-bottom:.3rem;display:flex;align-items:center;gap:.45rem}
.offercard .n .dot{width:.6rem;height:.6rem;border-radius:2px;background:var(--primary);transform:rotate(45deg)}
.offercard .d{font-family:'Inter',sans-serif;font-size:.86rem;line-height:1.5;color:var(--text-muted)}
/* script cards */
.scripts{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:.9rem}
.subhead{font-weight:700;font-size:1.02rem;letter-spacing:-.01em;margin:1.3rem 0 .6rem;display:flex;align-items:center;gap:.5rem}
.subhead .ic{font-size:1.05rem;opacity:.85}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem .95rem;display:flex;flex-direction:column;gap:.55rem;box-shadow:var(--shadow);transition:.15s}
.scard:hover{border-color:var(--primary)}
.scard .top{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.chip{font-family:"DM Mono",monospace;font-size:.64rem;font-weight:500;padding:.16rem .5rem;border-radius:5px;letter-spacing:.04em;text-transform:uppercase}
.chip.a{background:var(--primary-hl);color:var(--primary)}
.chip.g{background:color-mix(in oklch,var(--gold) 20%,transparent);color:var(--gold)}
.scard .subj{font-family:'Inter',sans-serif;font-size:.78rem;color:var(--text-muted)}
.scard .subj b{color:var(--gold);font-weight:600;font-family:"DM Mono",monospace;font-size:.72rem}
.scard .msg{font-family:"DM Mono",monospace;font-size:.8rem;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word}
.scard .ph{color:var(--primary);font-weight:500}
.scard .foot{display:flex;gap:.4rem;margin-top:.15rem;border-top:1px solid var(--border);padding-top:.6rem}
.minibtn{font-size:.74rem;font-weight:600;padding:.32rem .7rem;border-radius:6px;border:1px solid var(--primary);color:var(--primary);display:inline-flex;align-items:center;gap:.3rem}
.minibtn:hover{background:var(--primary);color:#fff}
.minibtn.done{background:var(--primary);color:#fff}
/* rules */
.rules{list-style:none;display:flex;flex-direction:column;gap:.55rem}
.rules li{position:relative;padding-left:1.4rem;font-family:'Inter',sans-serif;font-size:.9rem;line-height:1.55;color:var(--text)}
.rules li::before{content:"→";position:absolute;left:0;top:0;color:var(--primary);font-weight:700}
.rules li b{font-weight:600}
.vocab{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.2rem}
.word{font-family:"DM Mono",monospace;font-size:.72rem;padding:.2rem .55rem;border-radius:6px}
.word.ok{background:color-mix(in oklch,var(--good) 16%,transparent);color:var(--good)}
.word.no{background:var(--primary-hl);color:var(--primary);text-decoration:line-through;text-decoration-color:color-mix(in oklch,var(--primary) 60%,transparent)}
.notecard{background:var(--surface-2);border:1px dashed var(--border);border-radius:var(--radius);padding:.7rem .9rem;font-family:'Instrument Serif',serif;font-style:normal;font-size:.98rem;color:var(--text-muted);margin-top:.9rem}
/* research accordion (below the copy) */
.rlead{font-family:"DM Mono",monospace;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin:2.6rem 0 1rem;display:flex;align-items:center;gap:.7rem}
.rlead::after{content:"";flex:1;height:1px;background:var(--border)}
.rblock{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:.6rem;overflow:hidden}
.rblock>summary{list-style:none;cursor:pointer;padding:.8rem 1rem;display:flex;align-items:center;gap:.7rem;user-select:none;transition:background .15s}
.rblock>summary::-webkit-details-marker{display:none}
.rblock>summary:hover{background:var(--surface-2)}
.rblock>summary .rt{font-weight:700;font-size:.98rem;letter-spacing:-.01em;white-space:nowrap}
.rblock>summary .rs{font-family:'Inter',sans-serif;font-size:.82rem;color:var(--text-faint);font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:560px){.rblock>summary .rs{display:none}}
.rblock>summary .chev{margin-left:auto;color:var(--text-faint);transition:transform .2s;flex-shrink:0}
.rblock[open]>summary .chev{transform:rotate(90deg)}
.rblock[open]>summary{border-bottom:1px solid var(--border)}
.rbody{padding:1rem}
.hide{display:none!important}
.footer{max-width:1180px;margin:0 auto;padding:1.4rem 1.4rem 3rem;font-family:'Instrument Serif',serif;font-style:normal;font-size:.9rem;color:var(--text-faint);text-align:center}
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(1rem);background:var(--primary);color:#fff;padding:.55rem 1.1rem;border-radius:999px;font-size:.82rem;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head><body>

var SPINE={
 mission:"Start conversations. Get a reply, a demo opened, or a call booked. Not closing, not quoting. When someone bites, it becomes a call.",
 golden:"One wedge per lead, then expand. Never open with everything ROV does. Lead with the single obvious gap for that vertical. Branding, automation, and media only come up after they are interested.",
 offers:[
  {n:"Branding",d:"Logo, look, consistency, the name they own."},

 ],

 angles:[
  {a:"A",n:"Diagnosis",d:"Name the money leaks up front, offer to walk them through what you're seeing. Direct. Best when you want to lead with the problem."},
  {a:"B",n:"Curiosity",d:"Proof + a light tease, make them ask. Smoothest, cheapest to send at scale. The default for cold volume."},

 ],
 cta:"“want me to walk you through it?” It implies you've already looked, and it's an offer, not a demand. On reply, the reveal is the walkthrough itself.",

  "<b>Sound human, not like a brochure.</b> Real name + one specific detail so it's obviously not a blast.",

 {

/* ── helpers ── */
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function msgHTML(s){return esc(s).replace(PH,"<span class=\"ph\">$1</span>");}
var state={page:"spine",q:""};

/* ── nav ── */
function renderNav(){
 var h="<div class=\"navlabel\">Engine</div>";
 h+=navBtn("spine","🎯","The Spine","");
 h+=navBtn("radius","📍","Radius",RADIUS.length+" proofs");
 h+="<div class=\"navlabel\">Verticals</div>";
 VERTICALS.forEach(function(v){h+=navBtn(v.k,v.ico,v.label,scriptCount(v)+" scripts");});
 TODO.forEach(function(t){h+="<div class=\"navitem todo\"><span class=\"ico\">"+t.ico+"</span>"+t.label+"<span class=\"ct\">soon</span></div>";});
 document.getElementById("nav").innerHTML=h;
 Array.prototype.forEach.call(document.querySelectorAll(".navitem[data-k]"),function(b){b.onclick=function(){state.page=b.getAttribute("data-k");state.q="";document.getElementById("search").value="";render();window.scrollTo(0,0);};});
}
function navBtn(k,ico,label,ct){return "<button class=\"navitem"+(state.page===k?" on":"")+"\" data-k=\""+k+"\"><span class=\"ico\">"+ico+"</span>"+label+(ct?"<span class=\"ct\">"+ct+"</span>":"")+"</button>";}
function scriptCount(v){var n=0;for(var c in v.scripts)n+=v.scripts[c].length;return n;}

/* ── render ── */
function render(){
 renderNav();
 if(state.page==="spine")renderSpine();else if(state.page==="radius")renderRadius();else renderVertical(vert(state.page));
 applySearch();
}
function vert(k){for(var i=0;i<VERTICALS.length;i++)if(VERTICALS[i].k===k)return VERTICALS[i];return VERTICALS[0];}

function rblock(title,sub,inner){return "<details class=\"rblock\"><summary><span class=\"rt\">"+esc(title)+"</span>"+(sub?"<span class=\"rs\">"+sub+"</span>":"")+"<svg class=\"chev\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m9 18 6-6-6-6\"/></svg></summary><div class=\"rbody\">"+inner+"</div></details>";}

function block(title,inner){return "<section class=\"block\"><div class=\"blocktitle\">"+esc(title)+"</div>"+inner+"</section>";}
function angleCards(arr){return "<div class=\"cards3\">"+arr.map(function(a){return "<div class=\"anglecard\"><div class=\"a\">Angle "+esc(a.a)+"</div><div class=\"n\">"+esc(a.n)+"</div><div class=\"d\">"+esc(a.d)+"</div></div>";}).join("")+"</div>";}
function scriptCard(s){
 var subj="";
 if(s.subj)subj="<div class=\"subj\">Subjects: "+s.subj.map(function(x){return "<b>"+esc(x)+"</b>";}).join(" &nbsp;/&nbsp; ")+"</div>";
 var searchtext=esc(((s.angle||"")+" "+(s.subj?s.subj.join(" "):"")+" "+s.body).toLowerCase());
 var copy=s.subj?("Subject: "+s.subj[0]+"\n\n"+s.body):s.body;
 return "<div class=\"scard\" data-search=\""+searchtext+"\"><div class=\"top\"><span class=\"chip "+(s.angle.indexOf('C ')===0?"g":"a")+"\">"+esc(s.angle)+"</span></div>"+subj+
  "<div class=\"msg\">"+msgHTML(s.body)+"</div>"+
  "<div class=\"foot\"><button class=\"minibtn\" data-copyraw=\""+esc(copy)+"\">📋 Copy</button></div></div>";
}

/* ── copy ── */
function bindCopy(){
 Array.prototype.forEach.call(document.querySelectorAll("[data-copyraw]"),function(b){b.onclick=function(){doCopy(b,b.getAttribute("data-copyraw"));};});
 Array.prototype.forEach.call(document.querySelectorAll("[data-copy=spine-package]"),function(b){b.onclick=function(){doCopy(b,SPINE.package);};});
}
function doCopy(btn,txt){
 var label=btn.textContent;
 function ok(){btn.classList.add("done");btn.textContent="Copied ✓";toast("Copied to clipboard");setTimeout(function(){btn.classList.remove("done");btn.textContent=label;},1400);}
 if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(ok,function(){fallbackCopy(txt);ok();});}
 else{fallbackCopy(txt);ok();}
}
function fallbackCopy(txt){var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);}

/* ── search (filters cards on the active page) ── */
function applySearch(){
 var q=state.q.trim().toLowerCase();
 var cards=document.querySelectorAll("#body [data-search]");
 var rw=document.getElementById("researchWrap");
 if(rw)rw.classList.toggle("hide",!!q); // hide the strategy accordions while filtering copy
 if(!q){Array.prototype.forEach.call(cards,function(c){c.classList.remove("hide");});Array.prototype.forEach.call(document.querySelectorAll("#body .block"),function(b){b.classList.remove("hide");});return;}
 Array.prototype.forEach.call(cards,function(c){c.classList.toggle("hide",c.getAttribute("data-search").indexOf(q)<0);});
 // hide script/objection blocks that end up empty
 Array.prototype.forEach.call(document.querySelectorAll("#body .block"),function(b){
  var searchable=b.querySelectorAll("[data-search]");
  if(searchable.length){var anyVisible=false;Array.prototype.forEach.call(searchable,function(c){if(!c.classList.contains("hide"))anyVisible=true;});b.classList.toggle("hide",!anyVisible);}
 });
}
document.getElementById("search").oninput=function(){state.q=this.value;applySearch();};

var toastT;function toast(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove("show");},1600);}
document.getElementById("ver").textContent="v2 · "+VERTICALS.length+" verticals live";
render();
